name: 5AM Health Sync

on:
  schedule:
    # 5:00 AM Austin (CDT) is 10:00 AM UTC
    - cron: '0 10 * * *'
  workflow_dispatch: # This adds a "Run now" button for testing!

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install gspread google-auth

      - name: Run Sync Script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python health_sync.py
